<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qoo10 파이프라인 모니터</title>
<style>
  :root {
    --bg: #0f1117; --panel: #171a23; --panel-border: #262b3a;
    --text: #e6e8ef; --text-dim: #8b93a7; --ok: #4fd1a5; --bad: #e5534b; --idle: #6b7280;
    --mono: 'SF Mono', Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text); font-family: -apple-system, 'Pretendard', sans-serif;
    margin: 0; padding: 24px; font-size: 14px;
  }
  .wrap { max-width: 640px; margin: 0 auto; }
  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  h1 { font-size: 18px; margin: 0; }
  .sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .status-badge {
    display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600;
    padding: 6px 12px; border-radius: 20px;
  }
  .status-badge.running { background: rgba(79,209,165,0.15); color: var(--ok); }
  .status-badge.idle { background: rgba(107,114,128,0.15); color: var(--idle); }
  .pulse { width: 7px; height: 7px; border-radius: 50%; background: currentColor; animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .card {
    background: var(--panel); border: 1px solid var(--panel-border); border-radius: 12px;
    padding: 18px 20px; margin-bottom: 14px;
  }
  .card-title { font-size: 13px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 14px; }
  .metric-row { display: flex; justify-content: space-between; align-items: baseline; padding: 7px 0; border-bottom: 1px solid var(--panel-border); }
  .metric-row:last-child { border-bottom: none; }
  .metric-label { color: var(--text-dim); font-size: 13px; }
  .metric-value { font-family: var(--mono); font-size: 18px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .metric-value.success { color: var(--ok); }
  .metric-value.fail { color: var(--bad); }
  .refresh-btn {
    background: var(--panel); border: 1px solid var(--panel-border); color: var(--text);
    padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 6px;
  }
  .refresh-btn:hover { border-color: #3b4256; }
  .refresh-btn svg { width: 13px; height: 13px; }
  .footer-note { text-align: center; font-size: 11px; color: var(--text-dim); margin-top: 8px; }
  .error-box { background: rgba(229,83,75,0.1); color: var(--bad); padding: 8px 12px; border-radius: 8px; font-size: 12px; margin-top: 10px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Qoo10 파이프라인</h1>
      <div class="sub" id="lastUpdated">불러오는 중…</div>
    </div>
    <button class="refresh-btn" onclick="loadAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
      새로고침
    </button>
  </header>

  <div id="runningStatus" class="status-badge idle" style="margin-bottom:16px;">확인중…</div>

  <div class="card">
    <div class="card-title">1단계 (발굴 · 병합 · 번역)</div>
    <div class="metric-row">
      <div class="metric-label">완료 건수</div>
      <div class="metric-value" id="s1-done">—</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">2단계 (검증)</div>
    <div class="metric-row">
      <div class="metric-label">전체</div>
      <div class="metric-value" id="s2-total">—</div>
    </div>
    <div class="metric-row">
      <div class="metric-label">완료</div>
      <div class="metric-value" id="s2-done">—</div>
    </div>
    <div class="metric-row">
      <div class="metric-label">대기</div>
      <div class="metric-value" id="s2-pending">—</div>
    </div>
    <div class="metric-row">
      <div class="metric-label">성공</div>
      <div class="metric-value success" id="s2-success">—</div>
    </div>
    <div class="metric-row">
      <div class="metric-label">실패</div>
      <div class="metric-value fail" id="s2-fail">—</div>
    </div>
  </div>

  <div id="errorBox"></div>
  <div class="footer-note">60초마다 자동 새로고침</div>
</div>

<script>
const REPO = "wklee3k-source/qoo10-korea-price-compare";
const RAW = (path, branch) => `https://raw.githubusercontent.com/${REPO}/${branch}/${path}?t=${Date.now()}`;

function getGhToken() {
  let token = localStorage.getItem('qoo10_gh_token');
  if (!token) {
    token = prompt('GitHub 토큰을 입력하세요(실행상태 확인용, 최초 1회만):');
    if (token) localStorage.setItem('qoo10_gh_token', token.trim());
  }
  return token ? token.trim() : '';
}

async function ghFetch(path) {
  const token = getGhToken();
  return fetch(`https://api.github.com/repos/${REPO}${path}`, {
    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github+json' },
  });
}

async function loadAll() {
  const errorBox = document.getElementById('errorBox');
  errorBox.innerHTML = '';

  // 실행중 상태
  try {
    const res = await ghFetch('/actions/runs?status=in_progress&per_page=5');
    const data = await res.json();
    const badge = document.getElementById('runningStatus');
    if ((data.total_count || 0) > 0) {
      badge.className = 'status-badge running';
      badge.innerHTML = `<span class="pulse"></span>실행중 (${data.total_count}개 작업)`;
    } else {
      badge.className = 'status-badge idle';
      badge.textContent = '대기중 (실행중인 작업 없음)';
    }
  } catch (e) {
    document.getElementById('runningStatus').textContent = '상태확인 실패';
  }

  // 1단계: 병합된 discovery_state.json의 번역완료 건수
  try {
    const res = await fetch(RAW('output/discovery_state.json', 'discovery-live'));
    if (!res.ok) throw new Error(`상태코드 ${res.status}`);
    const data = await res.json();
    const products = data.all_products || [];
    const done = products.filter(p => p.translated_kr).length;
    document.getElementById('s1-done').textContent = done.toLocaleString();
  } catch (e) {
    document.getElementById('s1-done').textContent = '오류';
    errorBox.innerHTML += `<div class="error-box">1단계: ${e.message}</div>`;
  }

  // 2단계: hwahae_verified_39.json
  try {
    const res = await fetch(RAW('output/hwahae_verified_39.json', 'hwahae-live'));
    if (!res.ok) throw new Error(`상태코드 ${res.status}`);
    const data = await res.json();
    const doneCount = data.length;
    const success = data.filter(x => x.product_url && x.in_stock !== false).length;
    const fail = doneCount - success;

    // 2단계 "전체"는 1단계 완료건수 기준
    const s1Done = parseInt(document.getElementById('s1-done').textContent.replace(/,/g, '')) || 0;
    const total = s1Done;
    const pending = Math.max(0, total - doneCount);

    document.getElementById('s2-total').textContent = total.toLocaleString();
    document.getElementById('s2-done').textContent = doneCount.toLocaleString();
    document.getElementById('s2-pending').textContent = pending.toLocaleString();
    document.getElementById('s2-success').textContent = success.toLocaleString();
    document.getElementById('s2-fail').textContent = fail.toLocaleString();
  } catch (e) {
    document.getElementById('s2-total').textContent = '오류';
    errorBox.innerHTML += `<div class="error-box">2단계: ${e.message}</div>`;
  }

  document.getElementById('lastUpdated').textContent = '마지막 갱신: ' + new Date().toLocaleTimeString('ko-KR');
}

loadAll();
setInterval(loadAll, 60000);
</script>
</body>
</html>
