  header { margin-bottom: 24px; }

    padding: 6px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; font-family: var(--sans);
  }
  .filter-btn.active { background: var(--kr); color: white; border-color: var(--kr); }
  .card {
    background: var(--panel); border: 1px solid var(--panel-border); border-radius: 12px;
    margin-bottom: 16px; overflow: hidden;
  }
  .card-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px; border-bottom: 1px solid var(--panel-border); font-family: var(--mono); font-size: 11px; color: var(--text-dim);
  }
  .badges { display: flex; gap: 6px; }
  .badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; }
  .badge.match { background: rgba(79,209,165,0.15); color: var(--ok); }
  .badge.mismatch { background: rgba(229,83,75,0.15); color: var(--bad); }
  .badge.unknown { background: rgba(217,161,91,0.15); color: var(--warn); }
  .compare-grid { display: grid; grid-template-columns: 1fr 1fr; }
  @media (max-width: 640px) { .compare-grid { grid-template-columns: 1fr; } }
  .side { padding: 16px; }
  .side.qoo10 { border-right: 1px solid var(--panel-border); }
  @media (max-width: 640px) { .side.qoo10 { border-right: none; border-bottom: 1px solid var(--panel-border); } }
  .side-label {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 10px; font-weight: 700;
  }
  .side.qoo10 .side-label { color: var(--qoo); }
  .side.kr .side-label { color: var(--kr); }
  .prod-img {
    width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; background: #1a1f28; margin-bottom: 10px;
  }
  .prod-brand { font-size: 13px; color: var(--text-dim); margin-bottom: 2px; }
  .prod-name { font-size: 14px; font-weight: 600; line-height: 1.4; margin-bottom: 8px; }
  .prod-meta { display: flex; justify-content: space-between; align-items: center; font-family: var(--mono); font-size: 12px; }
  .prod-price { font-weight: 700; }
  .prod-link { color: var(--text-dim); text-decoration: none; font-size: 11px; }
  .prod-link:hover { color: var(--text); text-decoration: underline; }
  .no-img { display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: 12px; }
  footer { text-align: center; color: var(--text-dim); font-family: var(--mono); font-size: 11px; margin-top: 24px; }
</style>

const BADGE_LABEL = { match: '일치', mismatch: '불일치', unknown: '판단불가' };

function fmtPrice(p, unit) {
  if (p == null) return '가격정보없음';
  return p.toLocaleString('ko-KR') + unit;
}

function render(filter) {
  const cards = document.getElementById('cards');
  const filtered = PAIRS_DATA.filter(p => filter === 'all' || p.brand_status === filter);

  cards.innerHTML = filtered.map(p => `
    <div class="card">
      <div class="card-header">
        <span>상품번호: ${p.goods_no}</span>
        <div class="badges">
          <span class="badge ${p.brand_status}">브랜드 ${BADGE_LABEL[p.brand_status]}</span>
          <span class="badge ${p.vol_match ? 'match' : 'mismatch'}">용량 ${p.vol_match ? '일치' : '불일치'}</span>
        </div>
      </div>
      <div class="compare-grid">
        <div class="side qoo10">
          <div class="side-label">큐텐 (일본)</div>
          ${p.qoo10_image ? `<img class="prod-img" src="${p.qoo10_image}" loading="lazy">` : `<div class="prod-img no-img">이미지없음</div>`}
          <div class="prod-brand">${p.qoo10_brand || '-'}</div>
          <div class="prod-name">${p.qoo10_title}</div>
          <div class="prod-meta">
            <span class="prod-price">${fmtPrice(p.qoo10_price_jpy, '엔')}</span>
            <a class="prod-link" href="${p.qoo10_url}" target="_blank">원본보기 →</a>
          </div>
        </div>
        <div class="side kr">
          <div class="side-label">국내 (${p.kr_source === 'hwahae' ? '화해' : '네이버'})</div>
          ${p.kr_image ? `<img class="prod-img" src="${p.kr_image}" loading="lazy">` : `<div class="prod-img no-img">이미지없음</div>`}
          <div class="prod-brand">${p.kr_brand || '-'}</div>
          <div class="prod-name">${p.kr_name || '-'} ${p.kr_volume ? '('+p.kr_volume+')' : ''}</div>
          <div class="prod-meta">
            <span class="prod-price">${fmtPrice(p.kr_price, '원')}</span>
            ${p.kr_url ? `<a class="prod-link" href="${p.kr_url}" target="_blank">구매처보기 →</a>` : '<span class="prod-link">링크없음</span>'}
          </div>
        </div>
      </div>
    </div>
  `).join('');

  const matchCount = PAIRS_DATA.filter(p => p.brand_status === 'match').length;
  const mismatchCount = PAIRS_DATA.filter(p => p.brand_status === 'mismatch').length;
  const unknownCount = PAIRS_DATA.filter(p => p.brand_status === 'unknown').length;
  document.getElementById('summaryLine').textContent =
    `전체 ${PAIRS_DATA.length}건 · 브랜드일치 ${matchCount} · 불일치 ${mismatchCount} · 판단불가 ${unknownCount} · 지금 표시 ${filtered.length}건`;
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.filter);
  });
});

render('all');
</script>
