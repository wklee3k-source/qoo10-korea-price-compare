name: Qoo10 Pipeline

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      keyword:
        description: "검색할 상품명(핵심 문구) — scrape 작업용"
        required: false
        type: string
      discovery_keyword_ja:
        description: "저리뷰 상점 발굴 시작 검색어(일본어) — 비워두면 스케줄 실행과 동일한 기본값 사용"
        required: false
        type: string
      discovery_max_shops:
        description: "이번 실행에서 추가로 더 방문할 상점 수(누적 아님, 이번 실행분만)"
        required: false
        type: string
        default: "100"
      discovery_target_products:
        description: "목표 상품 수(이번 실행 기준 상한)"
        required: false
        type: string
        default: "500"
      discovery_shops_per_keyword:
        description: "검색어 1개당 최대 몇 개 상점까지 처리할지(비워두면 제한없음)"
        required: false
        type: string
      discovery_parallel:
        description: "병렬(matrix 4개 브랜치)로 돌릴지 — 각자 자기 전용 파일에만 저장(병합 안 함). 병합은 run_merge_discovery로 별도 실행"
        required: false
        type: boolean
        default: false
      run_merge_discovery:
        description: "[1.5단계] 4개 워커가 각자 쓴 discovery_state_<0~3>.json을 discovery_state.json 하나로 합칠지"
        required: false
        type: boolean
        default: false
      run_hwahae_verify:
        description: "output/hwahae_input_39.json을 화해로 검증할지"
        required: false
        type: boolean
        default: false
      run_auto_translate:
        description: "1단계에서 새로 발굴된(아직 번역 안 된) 상품을 Claude Haiku API로 자동번역할지"
        required: false
        type: boolean
        default: false
      run_retranslate_all:
        description: "기존에 이미 번역된 것들도 전부 Claude Haiku로 다시 번역해서 덮어쓸지(품질 일괄개선용)"
        required: false
        type: boolean
        default: false
      run_discovery:
        description: "1단계(저리뷰 상점 크롤링)를 돌릴지 — 이걸 꺼두면 다른 job(화해검증 등)만 단독 실행 가능"
        required: false
        type: boolean
        default: false
      naver_test_query:
        description: "네이버쇼핑 API 테스트용 검색어 (비워두면 이 job 안 돎)"
        required: false
        type: string
  push:
    paths:
      - "output/*_korea_side.json"

jobs:
  scrape:
    if: github.event_name == 'workflow_dispatch' && inputs.keyword != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run pipeline
        working-directory: src
        run: python pipeline.py "${{ inputs.keyword }}"

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "Auto: pipeline run for '${{ inputs.keyword }}'"
          git push

  discover_low_review_shops:
    # 저리뷰 상점/상품 자동발굴(순차 버전) — discovery_parallel=false일 때만 돈다.
    # 진짜 백그라운드 실행(사람이 세션을 안 열고 있어도 GitHub 서버에서 계속 돎).
    # 상태는 output/discovery_state.json에 저장되므로 타임아웃 걸려도 다시
    # 실행하면 이어서 진행된다.
    # [비활성화됨] cron-job.org 외부 스케줄이 이 job(병렬버전 없는 구버전
    # 트리거)을 계속 호출해서 병렬버전과 동시에 discovery-live에 커밋하며
    # 충돌을 일으켰다. cron-job.org 자체는 여기서 끌 수 없으므로(외부 서비스),
    # 이 job을 항상 false 조건으로 비활성화해서 크론이 호출해도 무해하게
    # 만든다 — 이제 discover는 병렬버전(discovery_parallel=true)만 쓴다.
    if: false && github.event_name == 'workflow_dispatch' && inputs.run_discovery && !inputs.discovery_parallel
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - name: Switch to dedicated branch (avoids push contention with hwahae_verify)
        run: |
          git fetch origin discovery-live 2>/dev/null && git checkout discovery-live || git checkout -b discovery-live
          git merge origin/main --no-edit -X theirs 2>/dev/null || true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers (캐시 miss일 때만)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install --with-deps chromium

      - name: Install Playwright system deps (캐시 hit여도 필요)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      # 매일 "+100개 상점"이 되도록, 지금까지 누적 방문한 상점 수를 읽어서
      # 오늘의 목표 상점수(cap) = 기존 누적 + 이번 실행분(기본 100)으로 계산한다.
      # workflow_dispatch로 수동 실행할 때 값을 직접 넣으면 그 값을 우선한다.
      - name: Compute today's shop cap
        id: cap
        working-directory: src
        run: |
          python3 -c "
          import json, pathlib
          p = pathlib.Path('../output/discovery_state.json')
          visited = len(json.loads(p.read_text())['visited_shops']) if p.exists() else 0
          increment = int('${{ inputs.discovery_max_shops }}' or '100')
          print(f'start={visited}')
          print(f'cap={visited + increment}')
          " >> "$GITHUB_OUTPUT"

      # 상점 2개 단위로 나눠서 반복 실행하고, 매 단위가 끝날 때마다 즉시
      # 커밋+푸시한다 — 이러면 실행이 다 끝나기 전에도 GitHub에서 지금까지
      # 몇 개나 처리됐는지 중간에 확인할 수 있다(전에는 끝까지 기다려야만
      # 결과가 보였다).
      - name: Run discovery in small increments (checkable mid-run)
        working-directory: src
        env:
          KEYWORD: ${{ inputs.discovery_keyword_ja || 'メディヒール エッセンシャルマスクパック' }}
          TARGET: ${{ inputs.discovery_target_products || '500' }}
          START: ${{ steps.cap.outputs.start }}
          FINAL_CAP: ${{ steps.cap.outputs.cap }}
          SHOPS_PER_KEYWORD: ${{ inputs.discovery_shops_per_keyword || '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          STEP=2
          current=$START
          while [ "$current" -lt "$FINAL_CAP" ]; do
            next=$((current + STEP))
            if [ "$next" -gt "$FINAL_CAP" ]; then next=$FINAL_CAP; fi
            echo "::group::상점 목표 $current -> $next"
            python iterative_low_review_discovery.py \
              "$KEYWORD" \
              "$TARGET" \
              ../output/discovery_result.xlsx \
              "$next" \
              "$SHOPS_PER_KEYWORD"
            echo "::endgroup::"

            python append_progress_history.py ../output
            git add ../output/discovery_state.json ../output/discovery_result.xlsx ../output/discovery_skip_log.json ../output/discovery_seed_log.json ../output/progress_history.json ../output/archive/ 2>/dev/null || true
            if ! git diff --cached --quiet; then
              git commit -m "Auto: discovery progress (상점 목표 $next)"
              for i in 1 2 3; do
                if git push origin discovery-live; then break; fi
                echo "push 실패, pull --rebase 후 재시도 ($i/3)"
                git pull --rebase origin discovery-live
              done
            fi
            current=$next
          done

  discover_low_review_shops_parallel:
    # 병렬 버전 — 4개 브랜치(matrix)가 동시에 각자 다른 시드를 처리한다.
    # [실시간 병합] 예전엔 각자 아티팩트에만 저장하고 4개가 "전부" 끝나야
    # 별도 job이 병합했는데, discover는 사실상 무한루프(끝나는 조건이
    # 거의 없음)라 실질적으로 병합이 몇 시간에 한 번(타임아웃)만 일어나는
    # 구조적 문제가 있었다. 이제 각 워커가 순차버전처럼 작은 단위(상점
    # 2개)로 나눠서 반복하고, 매 단위가 끝날 때마다 자기 전용 파일에 저장 +
    # discovery-live의 최신본을 받아와서 병합 + 즉시 커밋/push한다. 서로
    # 다른 파일(discovery_state_<branch>.json)에 쓰므로 병합 자체는 안전하고,
    # 메인 파일 push 경합은 재시도+지터로 흡수한다.
    if: github.event_name == 'workflow_dispatch' && inputs.discovery_parallel
    runs-on: ubuntu-latest
    timeout-minutes: 300
    concurrency:
      group: discover-parallel-branch-${{ matrix.branch }}
      cancel-in-progress: false
    strategy:
      matrix:
        branch: [0, 1, 2, 3]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Switch to dedicated branch (same as sequential discover)
        run: |
          git fetch origin discovery-live 2>/dev/null && git checkout discovery-live || git checkout -b discovery-live
          git merge origin/main --no-edit -X theirs 2>/dev/null || true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers (캐시 miss일 때만)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install --with-deps chromium

      - name: Install Playwright system deps (캐시 hit여도 필요)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      # 메인 discovery_state.json의 시드를 4등분해서 이 브랜치(matrix.branch)
      # 몫만 이 브랜치 전용 상태파일(discovery_state_<branch>.json)에 저장한다.
      # 이미 이 브랜치 전용 파일이 있으면(재실행) 그대로 이어서 쓴다.
      - name: Prepare this branch's seed keywords
        working-directory: src
        run: |
          python3 -c "
          import json, pathlib
          suffix = '${{ matrix.branch }}'
          branch_path = pathlib.Path(f'../output/discovery_state_{suffix}.json')
          if branch_path.exists():
              print('이미 이 브랜치 상태파일이 있어서 이어서 진행')
          else:
              main_path = pathlib.Path('../output/discovery_state.json')
              main_state = json.loads(main_path.read_text()) if main_path.exists() else {'pending_keywords': None}
              all_seeds = main_state.get('pending_keywords') or ['メディヒール エッセンシャルマスクパック']
              my_seeds = [kw for i, kw in enumerate(all_seeds) if i % 4 == int(suffix)]
              if not my_seeds:
                  my_seeds = [all_seeds[int(suffix) % len(all_seeds)]]
              branch_path.write_text(json.dumps({
                  'visited_shops': [], 'all_products': [], 'shop_urls': [],
                  'pending_keywords': my_seeds, 'seen_keywords': []
              }, ensure_ascii=False, indent=2))
              print(f'브랜치 {suffix} 시드 {len(my_seeds)}개:', my_seeds)
          "

      # 상점 몇 개 단위로 나눠서 반복 실행하고, 매 단위마다 즉시 커밋+push한다
      # (실시간). 4개가 전부 끝날 때까지 안 기다려도 지금까지 몇 개나
      # 처리됐는지 discovery-live에서 바로 확인 가능하다.
      - name: Run discovery in small increments (own file only — merging is a separate stage 1.5 job)
        working-directory: src
        env:
          TARGET: ${{ inputs.discovery_target_products || '999999' }}
          SHOPS_PER_KEYWORD: ${{ inputs.discovery_shops_per_keyword || '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          B="${{ matrix.branch }}"
          STEP=3
          ITER=0
          while true; do
            ITER=$((ITER + 1))
            # [중요] max_shops는 "이번 호출에서 몇 개 방문할지"가 아니라
            # "누적 visited_shops가 몇 개 되면 멈출지"다(스크립트 내부:
            # len(visited_shops) >= max_shops면 즉시 STOP). 고정값(STEP)을
            # 매번 그대로 넘기면, 1회차 이후로는 이미 누적치가 그 값을
            # 넘어서 있으니 2회차부터 계속 "즉시 멈춤"만 반복하는 버그가
            # 있었다(실측: 283회 중 사실상 1회만 유효했음). 순차버전처럼
            # 매번 "현재 누적 + STEP"을 다시 계산해서 넘긴다.
            CURRENT_VISITED=$(python3 -c "import json, pathlib; p = pathlib.Path('../output/discovery_state_${B}.json'); print(len(json.loads(p.read_text())['visited_shops']) if p.exists() else 0)")
            CAP=$((CURRENT_VISITED + STEP))
            echo "::group::브랜치 $B 반복 $ITER (누적 $CURRENT_VISITED -> 목표 $CAP)"
            python iterative_low_review_discovery.py \
              "" \
              "$TARGET" \
              "../output/discovery_result_${B}.xlsx" \
              "$CAP" \
              "$SHOPS_PER_KEYWORD" \
              "$B"
            echo "::endgroup::"

            # [경합/느려짐 방지] 4개 워커 전부 똑같이, 오직 자기 전용 파일만
            # 커밋/push한다. discovery_state.json(공유파일)은 절대 안 건드린다
            # — 그래서 워커끼리는 파일이 겹칠 일이 구조적으로 없다. 병합은
            # 이 job이 아니라 완전히 별도인 "1.5단계"(merge_discovery_shards)
            # job이 전담한다.
            #
            # [중요 버그 수정] 예전엔 매 반복마다 즉시 push를 시도했는데,
            # 다른 워커/병합job이 매우 자주 discovery-live에 커밋하는
            # 상황에서는 30번 재시도로도 못 따라잡아 push가 통째로 실패하고
            # 몇 시간치 작업(실측: 128개 상점)이 그대로 유실되는 사고가 있었다.
            # 이제 3반복(최대 9개 상점)마다 한 번만 push해서 시도 빈도를
            # 줄이고, 재시도도 "git pull --rebase"(바이너리 파일 있으면
            # 종종 조용히 실패) 대신 "내 파일을 백업 -> origin 최신으로
            # 리셋 -> 백업 복원 -> 재커밋" 방식을 써서 확실하게 성공시킨다.
            git add "../output/discovery_state_${B}.json" "../output/discovery_result_${B}.xlsx" 2>/dev/null || true
            if ! git diff --cached --quiet; then
              git commit -m "Auto: parallel discovery branch $B own-file progress (반복 $ITER)"
            fi

            if [ $((ITER % 3)) -eq 0 ]; then
              PUSHED=0
              for i in $(seq 1 40); do
                if git push origin discovery-live; then PUSHED=1; break; fi
                sleep_time=$((RANDOM % 5 + 1))
                echo "push 실패(경합), ${sleep_time}초 대기 후 재시도 ($i/40)"
                sleep "$sleep_time"
                # 내 전용 파일을 안전하게 백업해두고, origin 최신본으로
                # 완전히 리셋한 뒤, 백업을 되살려 다시 커밋한다(rebase보다
                # 확실함 — 내 파일은 나만 쓰니 항상 최신이 곧 정답).
                cp "../output/discovery_state_${B}.json" "/tmp/dstate_${B}_backup.json" 2>/dev/null || true
                cp "../output/discovery_result_${B}.xlsx" "/tmp/dresult_${B}_backup.xlsx" 2>/dev/null || true
                git fetch origin discovery-live 2>/dev/null
                git reset --hard origin/discovery-live -q 2>/dev/null || true
                cp "/tmp/dstate_${B}_backup.json" "../output/discovery_state_${B}.json" 2>/dev/null || true
                cp "/tmp/dresult_${B}_backup.xlsx" "../output/discovery_result_${B}.xlsx" 2>/dev/null || true
                git add "../output/discovery_state_${B}.json" "../output/discovery_result_${B}.xlsx" 2>/dev/null || true
                git diff --cached --quiet || git commit -m "Auto: parallel discovery branch $B own-file progress (반복 $ITER, 재시도)"
              done
              if [ "$PUSHED" != "1" ]; then
                echo "::warning::브랜치 $B: 40회 재시도에도 push 실패. 로컬 파일은 다음 반복에서 이어서 커밋 시도됨"
              fi
            fi
          done

  merge_discovery_shards:
    # [1.5단계] 4개 워커가 각자 쓴 discovery_state_<0~3>.json을 하나의
    # discovery_state.json으로 합친다. 순수 파일 I/O만 하므로(웹 스크래핑
    # 없음) 몇 초~몇십 초 안에 끝난다 — 수집 워커의 속도(상점당 몇십 초씩)에
    # 전혀 영향받지 않는, 완전히 독립된 가벼운 단계. 필요할 때마다 수동으로
    # 트리거하거나, 원하는 주기로 반복 트리거해서 쓴다.
    if: github.event_name == 'workflow_dispatch' && inputs.run_merge_discovery
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: merge-discovery-shards-queue
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Switch to dedicated branch
        run: |
          git fetch origin discovery-live 2>/dev/null && git checkout discovery-live || git checkout -b discovery-live
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Merge all 4 worker shards into discovery_state.json
        working-directory: src
        run: |
          for i in $(seq 1 15); do
            git fetch origin discovery-live 2>/dev/null
            git reset --hard origin/discovery-live -q
            python merge_discovery_states.py ../output
            python append_progress_history.py ../output
            git add ../output/discovery_state.json ../output/progress_history.json ../output/archive/ 2>/dev/null || true
            git diff --cached --quiet && { echo "합칠 변경사항 없음"; break; }
            git commit -m "Auto: merge discovery shards (1.5단계)"
            if git push origin discovery-live; then echo "병합 push 성공"; break; fi
            sleep_time=$((RANDOM % 6 + 1))
            echo "push 실패(경합), ${sleep_time}초 대기 후 재시도 ($i/15)"
            sleep "$sleep_time"
          done

  auto_translate:
    # 1단계에서 발굴된 큐텐 상품 중 아직 번역 안 된 것들을 Claude Haiku API로
    # 자동번역해서 output/hwahae_input_39.json에 추가한다(그동안 사람이 직접
    # 하나하나 번역하던 2단계를 자동화). 화장품 도메인 특화 오역(어성초/병풀/
    # 시카 등)을 방지하도록 시스템 프롬프트에 대응표를 넣어뒀다.
    if: github.event_name == 'workflow_dispatch' && inputs.run_auto_translate
    runs-on: ubuntu-latest
    timeout-minutes: 180
    concurrency:
      group: auto-translate-queue
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Switch to dedicated branch (fully separate from discovery-live and hwahae-live, avoids all contention)
        run: |
          git fetch origin translate-live 2>/dev/null && git checkout translate-live || git checkout -b translate-live
          git merge origin/main --no-edit -X theirs 2>/dev/null || true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests --break-system-packages

      - name: Fetch latest discovery data and find untranslated products
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: src
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # discovery-live 브랜치의 활성 상품 목록을 가져온다. 이제 아카이브는
          # "이미 번역완료된 것"만 담으므로(discover 쪽에서 그렇게 정리함),
          # 2단계는 discovery_state.json의 all_products만 보면 충분하다
          # — 아카이브를 따로 뒤질 필요가 없어져서 예전의 "아카이브 못
          # 가져와서 신규건수 오판" 버그가 원천적으로 사라진다.
          git fetch origin discovery-live
          git show origin/discovery-live:output/discovery_state.json > /tmp/ds.json

          # translate-live 브랜치 자체에 이미 있는 hwahae_input_39.json을 이어서 씀
          mkdir -p ../output
          if [ ! -f ../output/hwahae_input_39.json ]; then echo "[]" > ../output/hwahae_input_39.json; fi

          python3 << 'PYEOF'
          import json, sys

          all_qoo10 = {p['goods_no']: p for p in json.load(open('/tmp/ds.json'))['all_products']}

          existing = json.load(open('../output/hwahae_input_39.json'))
          existing_goods = set(x['goods_no'] for x in existing)

          new_products = [p for p in all_qoo10.values() if p['goods_no'] not in existing_goods]
          batch = new_products  # 캡 없이 전부 처리(Haiku는 저렴하고 빠름)
          json.dump(batch, open('/tmp/new_batch.json', 'w'), ensure_ascii=False)
          print(f"[INFO] 신규 상품 {len(new_products)}건 중 {len(batch)}건 이번에 번역", file=sys.stderr)
          PYEOF

          python3 auto_translate.py /tmp/new_batch.json /tmp/translated.json 15

          python3 << 'PYEOF'
          import json

          brand_dict = json.load(open('../data/brand_translations_learned.json'))
          brand_dict.pop('_설명', None)
          brand_dict.pop('_아도르_참고', None)

          new_qoo10 = {p['goods_no']: p for p in json.load(open('/tmp/new_batch.json'))}
          translated = json.load(open('/tmp/translated.json'))
          for t in translated:
              q = new_qoo10.get(t['goods_no'], {})
              t['known_brand'] = brand_dict.get(q.get('brand', ''), '')

          existing = json.load(open('../output/hwahae_input_39.json'))
          existing.extend(translated)
          json.dump(existing, open('../output/hwahae_input_39.json', 'w'), ensure_ascii=False, indent=2)
          print(f"[DONE] 총 {len(existing)}건")
          PYEOF

          python append_progress_history.py ../output
          git add ../output/hwahae_input_39.json ../output/progress_history.json
          git diff --cached --quiet && exit 0
          git commit -m "Auto: batch-translated new products via Claude Haiku API"
          for i in $(seq 1 15); do
            if git push origin translate-live; then break; fi
            sleep_time=$((RANDOM % 8 + 2))
            echo "push 실패, ${sleep_time}초 대기 후 재시도 ($i/15)"
            sleep "$sleep_time"
            git pull --rebase origin translate-live
          done

  retranslate_all:
    # 기존에 이미 번역된 항목들도 전부 Claude Haiku로 다시 번역해서
    # 덮어쓴다(품질 일괄개선용) — 초반에 사람이 수작업으로 급하게
    # 번역했던 것들 중 일부가 축약/누락된 경우가 있어서, 전체를
    # 일관된 시스템프롬프트(완전번역 강조)로 재작업한다.
    if: github.event_name == 'workflow_dispatch' && inputs.run_retranslate_all
    runs-on: ubuntu-latest
    timeout-minutes: 240
    concurrency:
      group: auto-translate-queue
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Switch to dedicated branch
        run: |
          git fetch origin translate-live 2>/dev/null && git checkout translate-live || git checkout -b translate-live
          git merge origin/main --no-edit -X theirs 2>/dev/null || true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests --break-system-packages

      - name: Re-translate all existing items from scratch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: src
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin discovery-live
          git show origin/discovery-live:output/discovery_state.json > /tmp/ds.json

          python3 << 'PYEOF'
          import json, sys

          all_qoo10 = {p['goods_no']: p for p in json.load(open('/tmp/ds.json'))['all_products']}
          existing = json.load(open('../output/hwahae_input_39.json'))

          # 이미 번역된 goods_no 중, 원문을 여전히 찾을 수 있는 것만 재번역 대상으로
          batch = [all_qoo10[x['goods_no']] for x in existing if x['goods_no'] in all_qoo10]
          json.dump(batch, open('/tmp/retranslate_batch.json', 'w'), ensure_ascii=False)
          print(f"[INFO] 재번역 대상 {len(batch)}건 (전체 {len(existing)}건 중 원문 확인된 것만)", file=sys.stderr)
          PYEOF

          rm -f /tmp/retranslated.json
          python3 auto_translate.py /tmp/retranslate_batch.json /tmp/retranslated.json 15

          python3 << 'PYEOF'
          import json

          brand_dict = json.load(open('../data/brand_translations_learned.json'))
          brand_dict.pop('_설명', None)
          brand_dict.pop('_아도르_참고', None)

          all_qoo10 = {p['goods_no']: p for p in json.load(open('/tmp/ds.json'))['all_products']}
          retranslated = {x['goods_no']: x for x in json.load(open('/tmp/retranslated.json'))}

          existing = json.load(open('../output/hwahae_input_39.json'))
          updated = 0
          for x in existing:
              if x['goods_no'] in retranslated:
                  x['translated_kr'] = retranslated[x['goods_no']]['translated_kr']
                  q = all_qoo10.get(x['goods_no'], {})
                  x['known_brand'] = brand_dict.get(q.get('brand', ''), x.get('known_brand', ''))
                  updated += 1
          json.dump(existing, open('../output/hwahae_input_39.json', 'w'), ensure_ascii=False, indent=2)
          print(f"[DONE] {updated}건 재번역으로 덮어씀")
          PYEOF

          git add ../output/hwahae_input_39.json
          git diff --cached --quiet && exit 0
          git commit -m "Auto: full re-translation pass via Claude Haiku API (quality improvement)"
          for i in $(seq 1 15); do
            if git push origin translate-live; then break; fi
            sleep_time=$((RANDOM % 8 + 2))
            echo "push 실패, ${sleep_time}초 대기 후 재시도 ($i/15)"
            sleep "$sleep_time"
            git pull --rebase origin translate-live
          done

  hwahae_verify:
    # 클로드가 미리 번역해둔 한글 핵심어 목록(output/hwahae_input_39.json)을
    # 화해에서 검증해서 정식 브랜드+상품명+용량을 가져온다. 매 건마다 즉시
    # 저장하므로 타임아웃 걸려도 재실행하면 이어서 진행된다.
    if: github.event_name == 'workflow_dispatch' && inputs.run_hwahae_verify
    runs-on: ubuntu-latest
    timeout-minutes: 240
    concurrency:
      group: hwahae-verify-queue
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Switch to dedicated branch (avoids push contention with discover)
        run: |
          git fetch origin hwahae-live 2>/dev/null && git checkout hwahae-live || git checkout -b hwahae-live
          git merge origin/main --no-edit -X theirs 2>/dev/null || true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers (캐시 miss일 때만)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install --with-deps chromium

      - name: Install Playwright system deps (캐시 hit여도 필요)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Run hwahae verification in chunks (checkable mid-run)
        working-directory: src
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 2단계(번역) 전용 브랜치(translate-live)에서 최신 번역목록을 가져온다
          # — hwahae-live에는 더 이상 hwahae_input_39.json을 안 두므로, 매번
          # 최신본을 읽기 전용으로 복사해온다(3단계가 여기에 쓰지 않음).
          git fetch origin translate-live 2>/dev/null && \
            git show origin/translate-live:output/hwahae_input_39.json > ../output/hwahae_input_39.json || \
            echo "[]" > ../output/hwahae_input_39.json

          TOTAL=$(python3 -c "import json; print(len(json.load(open('../output/hwahae_input_39.json'))))")
          CHUNK=2
          while true; do
            DONE_BEFORE=$(python3 -c "import json,pathlib; p=pathlib.Path('../output/hwahae_verified_39.json'); print(len(json.loads(p.read_text())) if p.exists() else 0)")
            if [ "$DONE_BEFORE" -ge "$TOTAL" ]; then
              echo "전부 완료됨 ($DONE_BEFORE/$TOTAL)"
              break
            fi
            echo "::group::처리 $DONE_BEFORE/$TOTAL 부터 최대 $CHUNK건"
            python hwahae_verify_batch.py ../output/hwahae_input_39.json ../output/hwahae_verified_39.json "$CHUNK"
            echo "::endgroup::"

            python append_progress_history.py ../output
            git add ../output/hwahae_verified_39.json ../output/progress_history.json
            if ! git diff --cached --quiet; then
              git commit -m "Auto: hwahae verification progress"
              for i in $(seq 1 15); do
                if git push origin hwahae-live; then break; fi
                sleep_time=$((RANDOM % 8 + 2))
                echo "push 실패, ${sleep_time}초 대기 후 재시도 ($i/15)"
                sleep "$sleep_time"
                git pull --rebase origin hwahae-live
              done
            fi

            DONE_AFTER=$(python3 -c "import json; print(len(json.load(open('../output/hwahae_verified_39.json'))))")
            if [ "$DONE_AFTER" -eq "$DONE_BEFORE" ]; then
              echo "진행 없음 — 중단"
              break
            fi
          done

  naver_api_test:
    # 네이버쇼핑 검색 API 테스트 — 이 샌드박스에선 openapi.naver.com이
    # 네트워크 정책으로 차단되어 있어서, GitHub Actions 러너에서 대신 실행한다.
    if: github.event_name == 'workflow_dispatch' && inputs.naver_test_query != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Test Naver Shopping Search API
        working-directory: src
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          python naver_shop_search.py \
            "케라스타즈 디스인탱글 샴푸" \
            "Verish 실리콘 데미누브라"

      - name: Install Playwright for gallery test
        run: |
          pip install playwright --break-system-packages
          playwright install --with-deps chromium

      - name: Test product gallery scraper
        working-directory: src
        run: |
          python product_gallery.py "https://smartstore.naver.com/main/products/10035737872"

      - name: Investigate full pipeline reproduction for still-failing items
        working-directory: src
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
        run: |
          python _investigate_full_pipeline.py

  build_excel:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build excel for each updated korea_side.json
        working-directory: src
        run: |
          for f in ../output/*_korea_side.json; do
            base=$(basename "$f" _korea_side.json)
            python excel_builder.py "$f" "../output/${base}_비교.xlsx"
          done

      - name: Commit excel output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/*.xlsx
          git diff --cached --quiet || git commit -m "Auto: build comparison excel"
          git push
